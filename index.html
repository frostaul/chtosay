<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ну, что я могу посоветовать</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 420px; margin: 0 auto; }
        h2 { text-align: center; margin: 12px 0; font-size: 21px; }
        .btn {
            display: block; width: 100%; padding: 13px; margin: 5px 0;
            background: #2ea6ff; color: #fff; border: none; border-radius: 12px;
            font-size: 14px; cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">
    <div id="start">
        <h2>🎬 Ну, что я могу посоветовать</h2>
        <p style="text-align:center;">Тестовая версия</p>
        <button class="btn" onclick="document.getElementById('result').classList.remove('hidden'); document.getElementById('start').classList.add('hidden');">🎬 Давай кино</button>
    </div>
    <div id="result" class="hidden">
        <h2>🎬 Фильм</h2>
        <p style="text-align:center;">Тестовый фильм</p>
        <button class="btn" onclick="document.getElementById('start').classList.remove('hidden'); document.getElementById('result').classList.add('hidden');">🏠 Меню</button>
    </div>
</div>
<script>
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
</script>
</body>
</html>
